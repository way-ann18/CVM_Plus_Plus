<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CVM++ Playground</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: monospace;
      background: #1e1e2e;
      color: #cdd6f4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 { font-size: 28px; margin-bottom: 6px; color: #cba6f7; }
    p  { font-size: 14px; color: #a6adc8; margin-bottom: 24px; }
    .container {
      width: 100%; max-width: 860px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    label { font-size: 12px; color: #a6adc8; margin-bottom: 6px; display: block; }
    textarea {
      width: 100%; height: 320px;
      background: #313244;
      color: #cdd6f4;
      border: 1px solid #45475a;
      border-radius: 8px;
      padding: 14px;
      font-family: monospace;
      font-size: 14px;
      resize: vertical;
      outline: none;
    }
    textarea:focus { border-color: #cba6f7; }
    #output {
      background: #181825;
      color: #a6e3a1;
      white-space: pre;
      overflow-y: auto;
    }
    button {
      margin-top: 16px;
      padding: 10px 32px;
      background: #cba6f7;
      color: #1e1e2e;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #b4befe; }
    .btn-row {
      grid-column: 1 / -1;
      display: flex;
      gap: 10px;
    }
    #status { font-size: 12px; color: #a6adc8; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>CVM++ Playground</h1>
  <p>Write your .cvm script and click Run. No installation needed.</p>

  <div class="container">
    <div>
      <label>Code editor</label>
      <textarea id="editor" spellcheck="false">let x = 1
while x < 6:
    output x
    let x = x + 1
end</textarea>
    </div>
    <div>
      <label>Output</label>
      <textarea id="output" readonly></textarea>
    </div>
    <div class="btn-row">
      <button onclick="runCode()">Run</button>
      <button onclick="clearAll()" style="background:#45475a;color:#cdd6f4">Clear</button>
    </div>
  </div>

  <div id="status">Loading CVM++ engine...</div>

  <script src="cvm.js"></script>
  <script>
    var cvmReady = false;
    var runCVM = null;

    Module.onRuntimeInitialized = function() {
      runCVM = Module.cwrap('runCVM', 'string', ['string']);
      cvmReady = true;
      document.getElementById('status').textContent = 'CVM++ engine ready.';
    };

    function runCode() {
      if (!cvmReady) {
        document.getElementById('output').value = 'Engine still loading, please wait...';
        return;
      }
      var code = document.getElementById('editor').value;
      var result = runCVM(code);
      document.getElementById('output').value = result || '(no output)';
    }

    function clearAll() {
      document.getElementById('editor').value = '';
      document.getElementById('output').value = '';
    }
  </script>
</body>
</html>
